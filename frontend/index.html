<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dodge AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    Dodge AI
  </div>
  <div class="header-badges">
    <span class="badge">SAP Order-to-Cash</span>
    <span class="badge">PostgreSQL</span>
    <span class="badge live" id="statusBadge">Connecting…</span>
  </div>
</header>

<div class="layout">

  <div class="graph-panel">
    <div class="graph-loading" id="graphLoading">
      <div class="spinner"></div>
      <p>Building graph…</p>
    </div>

    <div id="cy"></div>

    <div class="graph-overlay">
      <div class="graph-stat">Nodes <strong id="statNodes">—</strong></div>
      <div class="graph-stat">Edges <strong id="statEdges">—</strong></div>
    </div>

    <div class="graph-controls">
      <button class="ctrl-btn" onclick="cy.fit()">Fit</button>
      <button class="ctrl-btn" onclick="cy.zoom(cy.zoom()*1.3)">Zoom +</button>
      <button class="ctrl-btn" onclick="cy.zoom(cy.zoom()*0.75)">Zoom −</button>
      <button class="ctrl-btn" id="filterBtn" onclick="resetFilter()">Reset</button>
      <button class="ctrl-btn" onclick="runLayout()">Re-layout</button>
    </div>

    <div class="legend">
      <div class="legend-title">Node Types</div>
      <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Customer</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Sales Order</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Delivery</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Invoice</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Payment</div>
      <div class="legend-item"><div class="legend-dot" style="background:#64748b"></div>Journal</div>
    </div>

    <div class="node-tooltip" id="tooltip"></div>
  </div>

  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-title">Dodge AI</div>
        <div class="chat-subtitle">Ask anything about your data</div>
      </div>
      <span class="chat-model-badge">Gemini Flash</span>
    </div>

    <div class="suggestions">
      <div class="suggestions-label">Quick queries</div>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Which customers have the most sales orders?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Trace full flow of billing document 90504248</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Show sales orders delivered but not billed</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Which customers have unpaid invoices?</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chat-input-area">
      <div class="input-row">
        <textarea id="chatInput" rows="1" placeholder="Ask about orders, customers, invoices…"></textarea>
        <button id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
